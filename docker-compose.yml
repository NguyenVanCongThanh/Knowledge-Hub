services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowledge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.12.0-community
    container_name: knowledge-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j_data:/data
      - ./data/neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/knowledgehubpassword
    restart: unless-stopped

  knowledge-service:
    build: .
    container_name: knowledge-service
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /home/thanh:/data
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=knowledgehubpassword
      - EMBEDDING_MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
    depends_on:
      - qdrant
      - neo4j
    restart: unless-stopped
