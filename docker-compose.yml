services:
  qdrant:
    image: qdrant/qdrant:v1.8.0
    container_name: knowledge-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5.12.0-community
    container_name: knowledge-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-knowledgehubpassword}
    restart: unless-stopped

  knowledge-service:
    build: .
    container_name: knowledge-service
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - knowledge_data:/data
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-knowledgehubpassword}
      - EMBEDDING_MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
      - METADATA_DIR=/data/metadata
      - GITHUB_REPOS_DIR=/data/github_repos
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - POSTGRES_DB=knowledge_hub
    depends_on:
      - qdrant
      - neo4j
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: knowledge-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgrespassword}
      - POSTGRES_DB=knowledge_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  neo4j_data:
  neo4j_logs:
  knowledge_data:
  postgres_data:

